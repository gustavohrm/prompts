interface:
  display_name: "Brainstorming"
  short_description: "Turn ideas into approved designs before coding"
  default_prompt: "Use $brainstorming to explore the idea, ask one question at a time, compare approaches when there are meaningful choices, and get to an approved design before writing code. Use a lightweight design confirmation for trivial, obvious work. After approval, invoke `writing-specs` when the design should be documented or used to continue; if the user explicitly wants brainstorming only, stop there. When unclear, prefer documenting the approved design. Design approval does not approve planning or implementation, which normally continue with subagents on a new branch unless the user or repo calls for another path."
